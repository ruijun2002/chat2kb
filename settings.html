<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chat2KB — 设置</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-primary: #0A0E1A;
      --bg-secondary: #111827;
      --bg-tertiary: #1F2937;
      --accent-cyan: #00D4FF;
      --accent-purple: #7C3AED;
      --accent-green: #10B981;
      --accent-orange: #F59E0B;
      --text-primary: #F9FAFB;
      --text-secondary: #9CA3AF;
      --text-muted: #6B7280;
      --border-subtle: rgba(0, 212, 255, 0.1);
      --border-hover: rgba(0, 212, 255, 0.3);
      --font-sans: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      --font-mono: 'JetBrains Mono', 'SF Mono', monospace;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html { scroll-behavior: smooth; background: var(--bg-primary); }
    body {
      font-family: var(--font-sans);
      background: var(--bg-primary);
      color: var(--text-primary);
      min-height: 100vh;
      overflow-x: hidden;
      line-height: 1.6;
    }
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: var(--bg-primary); }
    ::-webkit-scrollbar-thumb { background: var(--accent-cyan); border-radius: 3px; }

    #particle-canvas { position: fixed; inset: 0; z-index: 0; pointer-events: none; }

    /* Header */
    .header {
      height: 64px; display: flex; align-items: center; justify-content: space-between;
      padding: 0 24px; background: rgba(10, 14, 26, 0.85); backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--border-subtle); position: relative; z-index: 1;
    }
    .header-left { display: flex; align-items: center; gap: 16px; }
    .back-btn {
      width: 36px; height: 36px; border-radius: 10px;
      border: 1px solid rgba(255,255,255,0.1); background: rgba(255,255,255,0.05);
      color: var(--text-secondary); display: flex; align-items: center; justify-content: center;
      text-decoration: none; transition: all 0.2s;
    }
    .back-btn:hover { color: var(--accent-cyan); border-color: var(--border-hover); background: rgba(0,212,255,0.08); }
    .brand {
      font-size: 20px; font-weight: 800;
      background: linear-gradient(135deg, var(--accent-cyan), var(--accent-purple));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
    }

    /* Main content */
    .container { position: relative; z-index: 1; max-width: 680px; margin: 0 auto; padding: 32px 24px 80px; }
    .page-title {
      font-size: 28px; font-weight: 700; margin-bottom: 8px;
      background: linear-gradient(135deg, var(--accent-cyan), var(--accent-purple));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
    }
    .page-subtitle { font-size: 15px; color: var(--text-secondary); margin-bottom: 32px; }

    /* Card */
    .card {
      background: var(--bg-secondary); border: 1px solid var(--border-subtle);
      border-radius: 16px; padding: 24px; margin-bottom: 20px;
      transition: all 0.3s;
    }
    .card:hover { border-color: var(--border-hover); }
    .card-title {
      font-size: 16px; font-weight: 600; color: var(--text-primary); margin-bottom: 16px;
      display: flex; align-items: center; gap: 8px;
    }
    .card-title svg { color: var(--accent-cyan); }

    /* Radio group */
    .radio-group { display: flex; flex-direction: column; gap: 10px; }
    .radio-item {
      display: flex; align-items: center; gap: 12px;
      padding: 12px 14px; border-radius: 10px;
      border: 1px solid rgba(255,255,255,0.06); background: rgba(255,255,255,0.02);
      cursor: pointer; transition: all 0.2s;
    }
    .radio-item:hover { border-color: var(--border-hover); background: rgba(0,212,255,0.04); }
    .radio-item input[type="radio"] {
      appearance: none; width: 16px; height: 16px;
      border: 2px solid var(--text-muted); border-radius: 50%;
      cursor: pointer; position: relative; transition: all 0.2s; flex-shrink: 0;
    }
    .radio-item input[type="radio"]:checked { border-color: var(--accent-cyan); background: var(--accent-cyan); }
    .radio-item input[type="radio"]:checked::after {
      content: ''; position: absolute; inset: 3px; border-radius: 50%; background: var(--bg-primary);
    }
    .radio-item label { cursor: pointer; flex: 1; font-size: 14px; color: var(--text-primary); }
    .radio-desc { font-size: 12px; color: var(--text-muted); margin-top: 2px; }

    /* Status */
    .status-row { display: flex; align-items: center; gap: 8px; font-size: 14px; color: var(--text-secondary); }
    .status-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--text-muted); }
    .status-dot.online { background: var(--accent-green); animation: pulse 2s ease-in-out infinite; }
    .status-dot.offline { background: var(--text-muted); animation: none; }
    @keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:0.5;transform:scale(1.2)} }
    .check-btn {
      padding: 6px 14px; border-radius: 8px; border: 1px solid var(--border-subtle);
      background: transparent; color: var(--text-secondary); font-size: 13px; cursor: pointer;
      transition: all 0.2s; margin-left: auto;
    }
    .check-btn:hover { border-color: var(--border-hover); color: var(--accent-cyan); }

    /* Danger zone */
    .danger-zone { border-color: rgba(239,68,68,0.15); }
    .danger-zone .card-title { color: #ef4444; }
    .danger-zone .card-title svg { color: #ef4444; }
    .danger-btn {
      padding: 10px 20px; border-radius: 10px; border: 1px solid rgba(239,68,68,0.3);
      background: rgba(239,68,68,0.08); color: #ef4444; font-size: 14px; font-weight: 600;
      cursor: pointer; transition: all 0.2s;
    }
    .danger-btn:hover { background: rgba(239,68,68,0.15); border-color: rgba(239,68,68,0.5); }

    /* Save bar */
    .save-bar {
      position: fixed; bottom: 0; left: 0; right: 0;
      padding: 16px 24px; background: rgba(10, 14, 26, 0.95); backdrop-filter: blur(20px);
      border-top: 1px solid var(--border-subtle); z-index: 100;
      display: flex; justify-content: center; gap: 12px;
    }
    .save-btn {
      padding: 12px 32px; border-radius: 10px; border: none;
      background: linear-gradient(90deg, var(--accent-cyan), var(--accent-purple));
      color: white; font-size: 15px; font-weight: 600; cursor: pointer;
      transition: all 0.2s;
    }
    .save-btn:hover { transform: translateY(-1px); box-shadow: 0 8px 20px rgba(0,212,255,0.3); }
    .save-hint { font-size: 13px; color: var(--text-muted); align-self: center; }

    /* Toast */
    .toast {
      position: fixed; top: 80px; left: 50%; transform: translateX(-50%) translateY(-20px);
      padding: 12px 24px; border-radius: 10px; border: 1px solid var(--border-subtle);
      background: var(--bg-secondary); color: var(--text-primary); font-size: 14px;
      opacity: 0; transition: all 0.3s ease; z-index: 2000; pointer-events: none;
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
    .toast.success { border-color: rgba(16,185,129,0.3); color: var(--accent-green); }

    @media (max-width: 640px) {
      .header { padding: 0 16px; }
      .container { padding: 24px 16px 80px; }
      .page-title { font-size: 24px; }
      .save-bar { padding: 12px 16px; flex-direction: column; align-items: center; }
      .save-btn { width: 100%; }
    }
  </style>
</head>
<body>
  <canvas id="particle-canvas"></canvas>

  <header class="header">
    <div class="header-left">
      <a href="chat.html" class="back-btn" title="返回对话">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M19 12H5M12 19l-7-7 7-7"/>
        </svg>
      </a>
      <div class="brand">Chat2KB</div>
    </div>
  </header>

  <div class="container">
    <h1 class="page-title">设置</h1>
    <p class="page-subtitle">管理 Chat2KB 的连接偏好与对话数据。</p>

    <!-- Backend Mode -->
    <div class="card">
      <div class="card-title">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="2" y="2" width="20" height="8" rx="2" ry="2"></rect>
          <rect x="2" y="14" width="20" height="8" rx="2" ry="2"></rect>
          <line x1="6" y1="6" x2="6.01" y2="6"></line>
          <line x1="6" y1="18" x2="6.01" y2="18"></line>
        </svg>
        后端模式
      </div>
      <div class="radio-group">
        <div class="radio-item">
          <input type="radio" name="backendMode" id="modeAuto" value="auto" checked>
          <label for="modeAuto">自动检测</label>
        </div>
        <div class="radio-desc" style="padding-left: 30px; margin-bottom: 8px;">优先尝试后端 API，不可用则自动降级为本地模拟。</div>
        <div class="radio-item">
          <input type="radio" name="backendMode" id="modeLocal" value="local">
          <label for="modeLocal">本地模拟</label>
        </div>
        <div class="radio-desc" style="padding-left: 30px; margin-bottom: 8px;">始终使用本地演示数据，无需后端服务。</div>
        <div class="radio-item">
          <input type="radio" name="backendMode" id="modeBackend" value="backend">
          <label for="modeBackend">强制后端 API</label>
        </div>
        <div class="radio-desc" style="padding-left: 30px; margin-bottom: 8px;">始终调用后端 API，连接失败则报错。</div>
      </div>
    </div>

    <!-- Backend Status -->
    <div class="card">
      <div class="card-title">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path>
          <polyline points="22 4 12 14.01 9 11.01"></polyline>
        </svg>
        后端连接状态
      </div>
      <div class="status-row">
        <span class="status-dot" id="statusDot"></span>
        <span id="statusText">检测中…</span>
        <button class="check-btn" id="checkBtn">重新检测</button>
      </div>
    </div>

    <!-- Danger Zone -->
    <div class="card danger-zone">
      <div class="card-title">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"></path>
          <line x1="12" y1="9" x2="12" y2="13"></line>
          <line x1="12" y1="17" x2="12.01" y2="17"></line>
        </svg>
        对话管理
      </div>
      <p style="font-size: 14px; color: var(--text-secondary); margin-bottom: 16px;">清空当前对话历史，操作不可撤销。</p>
      <button class="danger-btn" id="resetChatBtn">清空对话</button>
    </div>
  </div>

  <!-- Save bar -->
  <div class="save-bar">
    <span class="save-hint">设置会自动保存到浏览器本地存储。</span>
    <button class="save-btn" id="saveBtn">保存设置</button>
  </div>

  <!-- Toast -->
  <div class="toast" id="toast">设置已保存</div>

  <script>
    // Particle Background
    const canvas = document.getElementById('particle-canvas');
    const ctx = canvas.getContext('2d');
    let particles = [];
    function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
    class Particle {
      constructor() { this.reset(); }
      reset() {
        this.x = Math.random() * canvas.width; this.y = Math.random() * canvas.height;
        this.vx = (Math.random() - 0.5) * 0.5; this.vy = (Math.random() - 0.5) * 0.5;
        this.size = Math.random() * 2 + 0.5; this.opacity = Math.random() * 0.4 + 0.1;
      }
      update() {
        this.x += this.vx; this.y += this.vy;
        if (this.x < 0 || this.x > canvas.width || this.y < 0 || this.y > canvas.height) this.reset();
      }
      draw() { ctx.fillStyle = `rgba(0, 212, 255, ${this.opacity})`; ctx.fillRect(this.x, this.y, this.size, this.size); }
    }
    function initParticles() {
      particles = [];
      const count = Math.min(200, Math.floor((canvas.width * canvas.height) / 6000));
      for (let i = 0; i < count; i++) particles.push(new Particle());
    }
    function animate() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      particles.forEach(p => { p.update(); p.draw(); });
      requestAnimationFrame(animate);
    }
    resize(); initParticles(); animate();
    window.addEventListener('resize', () => { resize(); initParticles(); });

    // Settings Logic
    const statusDot = document.getElementById('statusDot');
    const statusText = document.getElementById('statusText');
    const checkBtn = document.getElementById('checkBtn');
    const saveBtn = document.getElementById('saveBtn');
    const resetChatBtn = document.getElementById('resetChatBtn');
    const toast = document.getElementById('toast');

    // Load saved mode
    const savedMode = localStorage.getItem('chat2kb_backendMode') || 'auto';
    document.querySelectorAll('input[name="backendMode"]').forEach(r => {
      if (r.value === savedMode) r.checked = true;
    });

    async function checkBackend() {
      statusText.textContent = '检测中…';
      statusDot.className = 'status-dot';
      try {
        const resp = await fetch('/api/chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ env: 'general', query: 'ping' })
        });
        if (resp.ok) {
          statusText.textContent = '后端 API 已连接';
          statusDot.classList.add('online');
        } else {
          statusText.textContent = '后端 API 异常 (' + resp.status + ')';
          statusDot.classList.add('offline');
        }
      } catch (e) {
        statusText.textContent = '后端 API 不可用';
        statusDot.classList.add('offline');
      }
    }

    checkBtn.addEventListener('click', checkBackend);

    saveBtn.addEventListener('click', () => {
      const selected = document.querySelector('input[name="backendMode"]:checked');
      if (selected) {
        localStorage.setItem('chat2kb_backendMode', selected.value);
      }
      toast.textContent = '设置已保存';
      toast.classList.add('show', 'success');
      setTimeout(() => { toast.classList.remove('show', 'success'); }, 2000);
    });

    resetChatBtn.addEventListener('click', () => {
      if (confirm('确定要清空对话历史吗？此操作不可撤销。')) {
        localStorage.removeItem('chat2kb_messages');
        toast.textContent = '对话已清空';
        toast.classList.add('show', 'success');
        setTimeout(() => { toast.classList.remove('show', 'success'); }, 2000);
      }
    });

    // Auto check on load
    checkBackend();
  </script>
</body>
</html>
